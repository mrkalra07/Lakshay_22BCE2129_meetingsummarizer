<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary History</title>
    <link rel="stylesheet" href="pages.css">
</head>
<body>
    <div class="container">
        <a href="upload.html" class="back-link">&larr; Back to Upload</a>
        <h1>Summary History</h1>
        
        <button id="clear-all-btn">Clear All History</button>

        <div id="history-list">
            <p>Loading history...</p>
        </div>
    </div>

    <script>
    const backendOrigin = 'http://localhost:8080';
    const baseUrl = (location.origin === backendOrigin) ? '' : backendOrigin;

        const historyListDiv = document.getElementById('history-list');
        const clearAllBtn = document.getElementById('clear-all-btn');

        // Function to load and display history
        async function loadHistory() {
            try {
                const response = await fetch(`${baseUrl}/api/meetings`);
                const meetings = await response.json();

                if (meetings.length === 0) {
                    historyListDiv.innerHTML = '<p>No summaries have been saved yet.</p>';
                    clearAllBtn.style.display = 'none'; // Hide button if there's no history
                    return;
                }

                clearAllBtn.style.display = 'block';
                const ul = document.createElement('ul');
                meetings.forEach(meeting => {
                    const li = document.createElement('li');
                    
                    const a = document.createElement('a');
                    a.href = `summary.html?id=${meeting.id}`;
                    a.textContent = meeting.originalFileName || 'Untitled Summary';
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-btn';
                    deleteBtn.textContent = 'Delete';
                    deleteBtn.dataset.id = meeting.id; // Store the ID on the button
                    
                    li.appendChild(a);
                    li.appendChild(deleteBtn);
                    ul.appendChild(li);
                });
                historyListDiv.innerHTML = '';
                historyListDiv.appendChild(ul);

            } catch (error) {
                historyListDiv.innerHTML = '<p style="color: red;">Could not load history.</p>';
            }
        }
        
        // --- EVENT LISTENERS ---

        // Load history when the page opens
        document.addEventListener('DOMContentLoaded', loadHistory);

        // Handle clicks on individual delete buttons
        historyListDiv.addEventListener('click', async (event) => {
            if (event.target.classList.contains('delete-btn')) {
                const meetingId = event.target.dataset.id;
                
                if (confirm('Are you sure you want to delete this summary?')) {
                    try {
                        await fetch(`${baseUrl}/api/meetings/${meetingId}`, { method: 'DELETE' });
                        event.target.closest('li').remove(); // Remove the item from the page
                    } catch (error) {
                        alert('Failed to delete summary.');
                    }
                }
            }
        });

        // Handle click on the "Clear All" button
        clearAllBtn.addEventListener('click', async () => {
            if (confirm('Are you sure you want to delete ALL history? This cannot be undone.')) {
                try {
                    await fetch(`${baseUrl}/api/meetings`, { method: 'DELETE' });
                    loadHistory(); // Reload the list (which will now be empty)
                } catch (error) {
                    alert('Failed to clear history.');
                }
            }
        });
    </script>
</body>
</html>
